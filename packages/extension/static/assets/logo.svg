<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- App Icon Background Gradient -->
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#0a122e"/>
            <stop offset="60%" stop-color="#050818"/>
            <stop offset="100%" stop-color="#020308"/>
        </radialGradient>

        <!-- Main Body Gradient (Cyan to Purple) -->
        <linearGradient id="hoodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00f2fe"/>
            <stop offset="45%" stop-color="#4facfe"/>
            <stop offset="100%" stop-color="#7b2cbf"/>
        </linearGradient>

        <!-- Circuit Tail Gradient -->
        <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7b2cbf"/>
            <stop offset="100%" stop-color="#00f2fe"/>
        </linearGradient>

        <!-- Accent Gradient for Core -->
        <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00f2fe"/>
            <stop offset="100%" stop-color="#9d4edd"/>
        </linearGradient>

        <!-- Clean, performant glows for smaller resolutions -->
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1"/>
            <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.8"/>
            <feDropShadow dx="0" dy="0" stdDeviation="25" flood-color="#7b2cbf" flood-opacity="0.4"/>
        </filter>
    </defs>

    <!-- Deep Space App Icon Base -->
    <rect width="512" height="512" rx="120" fill="url(#bgGrad)"/>

    <!-- Subtle Background Network Rings -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="#7b2cbf" stroke-width="3" stroke-dasharray="6 18" opacity="0.4"/>
    <circle cx="256" cy="256" r="210" fill="none" stroke="#00f2fe" stroke-width="1.5" opacity="0.15"/>

    <!-- The Wraith Character -->
    <g>
        <!-- Dark Void Visor (The space behind the face) -->
        <rect x="200" y="184" width="112" height="140" rx="56" fill="#020308"/>

        <!-- The Hood / Cloak (Geometrically perfect, continuous path) -->
        <path d="M 140,300 
                 L 140,240 
                 A 116,116 0 0,1 372,240 
                 L 372,300 
                 A 20,20 0 0,1 352,320 
                 L 332,320 
                 A 20,20 0 0,1 312,300 
                 L 312,240 
                 A 56,56 0 0,0 200,240 
                 L 200,300 
                 A 20,20 0 0,1 180,320 
                 L 160,320 
                 A 20,20 0 0,1 140,300 Z" 
              fill="url(#hoodGrad)" 
              filter="url(#dropShadow)"/>

        <!-- Friendly Glowing Eyes -->
        <g filter="url(#neonGlow)">
            <!-- Left Eye -->
            <path d="M 220,215 Q 232,198 244,215" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
            <circle cx="232" cy="232" r="4" fill="#00f2fe"/>
            
            <!-- Right Eye -->
            <path d="M 268,215 Q 280,198 292,215" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
            <circle cx="280" cy="232" r="4" fill="#00f2fe"/>
        </g>

        <!-- Geometric Core / Heart -->
        <g filter="url(#neonGlow)">
            <!-- Core Node -->
            <polygon points="256,256 276,276 256,296 236,276" fill="url(#accentGrad)"/>
            <!-- Orbit Ring -->
            <ellipse cx="256" cy="276" rx="38" ry="12" transform="rotate(-15 256 276)" fill="none" stroke="#00f2fe" stroke-width="2.5"/>
        </g>

        <!-- Network Route Trails (Circuits flowing downwards) -->
        <g fill="none" stroke="url(#circuitGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)">
            <!-- Left Proxy Trail -->
            <path d="M 170,320 L 170,355 L 200,385 L 200,410"/>
            <!-- Right Proxy Trail -->
            <path d="M 342,320 L 342,355 L 312,385 L 312,410"/>
            <!-- Center Trunk Route -->
            <path d="M 256,305 L 256,420"/>
        </g>

        <!-- Routing Nodes (Endpoints) -->
        <g filter="url(#neonGlow)">
            <circle cx="200" cy="410" r="8" fill="#00f2fe"/>
            <circle cx="256" cy="420" r="10" fill="#9d4edd"/>
            <circle cx="312" cy="410" r="8" fill="#00f2fe"/>
        </g>

        <!-- Floating Data Packets (Minimalist shards) -->
        <g opacity="0.8" filter="url(#neonGlow)">
            <rect x="115" y="180" width="12" height="12" rx="3" transform="rotate(45 121 186)" fill="#00f2fe"/>
            <rect x="385" y="270" width="16" height="16" rx="4" transform="rotate(15 393 278)" fill="#9d4edd"/>
            <rect x="145" y="400" width="10" height="10" rx="2" transform="rotate(-20 150 405)" fill="#4facfe"/>
        </g>
    </g>
</svg>