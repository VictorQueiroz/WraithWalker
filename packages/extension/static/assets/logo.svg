
    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- Background Gradient -->
            <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
                <stop offset="0%" stop-color="#0a1128"/>
                <stop offset="60%" stop-color="#050714"/>
                <stop offset="100%" stop-color="#020205"/>
            </radialGradient>

            <!-- Glow Filters -->
            <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur1"/>
                <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur2"/>
                <feGaussianBlur in="SourceGraphic" stdDeviation="25" result="blur3"/>
                <feMerge>
                    <feMergeNode in="blur3"/>
                    <feMergeNode in="blur2"/>
                    <feMergeNode in="blur1"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>

            <!-- Body Gradients -->
            <linearGradient id="cloakOuter" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.6"/>
                <stop offset="40%" stop-color="#4facfe" stop-opacity="0.4"/>
                <stop offset="70%" stop-color="#7b2cbf" stop-opacity="0.1"/>
                <stop offset="100%" stop-color="#050714" stop-opacity="0"/>
            </linearGradient>

            <linearGradient id="cloakInner" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#e0ffff" stop-opacity="0.9"/>
                <stop offset="30%" stop-color="#00f2fe" stop-opacity="0.7"/>
                <stop offset="60%" stop-color="#4facfe" stop-opacity="0.3"/>
                <stop offset="100%" stop-color="#120c24" stop-opacity="0"/>
            </linearGradient>

            <linearGradient id="visorDark" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#020308" stop-opacity="1"/>
                <stop offset="100%" stop-color="#080b1f" stop-opacity="1"/>
            </linearGradient>

            <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#4facfe" stop-opacity="0"/>
                <stop offset="20%" stop-color="#00f2fe" stop-opacity="0.8"/>
                <stop offset="80%" stop-color="#00f2fe" stop-opacity="0.4"/>
                <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
            </linearGradient>
            
            <linearGradient id="circuitGradPurple" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#7b2cbf" stop-opacity="0"/>
                <stop offset="30%" stop-color="#9d4edd" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#9d4edd" stop-opacity="0"/>
            </linearGradient>
        </defs>

        <!-- Deep Background -->
        <rect width="1000" height="1000" fill="url(#bgGrad)"/>

        <!-- Ambient Background Network / Routes -->
        <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1.5">
            <path d="M 100,200 L 300,100 L 500,250 L 800,150 L 950,400 L 800,700 L 500,850 L 200,750 Z"/>
            <path d="M 300,100 L 500,50 L 800,150"/>
            <path d="M 100,200 L 150,450 L 200,750"/>
            <path d="M 800,700 L 900,850 L 500,850"/>
            <path d="M 150,450 L 500,500 L 950,400"/>
        </g>
        <g fill="#ffffff" opacity="0.1">
            <circle cx="100" cy="200" r="3"/>
            <circle cx="300" cy="100" r="4"/>
            <circle cx="500" cy="50" r="3"/>
            <circle cx="800" cy="150" r="4"/>
            <circle cx="950" cy="400" r="5"/>
            <circle cx="800" cy="700" r="4"/>
            <circle cx="900" cy="850" r="3"/>
            <circle cx="500" cy="850" r="5"/>
            <circle cx="200" cy="750" r="4"/>
            <circle cx="150" cy="450" r="5"/>
            <circle cx="500" cy="500" r="3"/>
        </g>

        <!-- Data Flow/Interception Halo -->
        <g opacity="0.6">
            <ellipse cx="500" cy="200" rx="220" ry="60" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="8 12" transform="rotate(-10 500 200)"/>
            <ellipse cx="500" cy="200" rx="220" ry="60" fill="none" stroke="#7b2cbf" stroke-width="2" stroke-dasharray="2 24" transform="rotate(5 500 200)"/>
            <circle cx="300" cy="165" r="6" fill="#00f2fe" filter="url(#softGlow)"/>
            <circle cx="710" cy="190" r="4" fill="#9d4edd" filter="url(#softGlow)"/>
            <circle cx="680" cy="250" r="8" fill="#00f2fe" filter="url(#softGlow)"/>
        </g>

        <!-- Circuit Tail Routes (The Network Connection) -->
        <g fill="none" stroke-linejoin="round" stroke-linecap="round">
            <!-- Left Side Routes -->
            <path d="M 450,550 C 400,600 350,650 300,650 L 200,650 L 120,730 L 120,850" stroke="url(#circuitGrad)" stroke-width="3" filter="url(#softGlow)"/>
            <path d="M 460,570 C 420,620 380,630 330,670 L 250,670 L 180,740 L 180,900" stroke="url(#circuitGrad)" stroke-width="2"/>
            <path d="M 440,600 C 380,650 380,680 340,720 L 340,880" stroke="url(#circuitGradPurple)" stroke-width="4" filter="url(#softGlow)"/>
            <path d="M 470,580 C 440,630 400,690 300,700 L 220,780 L 150,780" stroke="url(#circuitGrad)" stroke-width="1.5"/>

            <!-- Right Side Routes -->
            <path d="M 550,550 C 600,600 650,650 700,650 L 800,650 L 880,730 L 880,850" stroke="url(#circuitGrad)" stroke-width="3" filter="url(#softGlow)"/>
            <path d="M 540,570 C 580,620 620,630 670,670 L 750,670 L 820,740 L 820,900" stroke="url(#circuitGrad)" stroke-width="2"/>
            <path d="M 560,600 C 620,650 620,680 660,720 L 660,880" stroke="url(#circuitGradPurple)" stroke-width="4" filter="url(#softGlow)"/>
            <path d="M 530,580 C 560,630 600,690 700,700 L 780,780 L 850,780" stroke="url(#circuitGrad)" stroke-width="1.5"/>

            <!-- Central Downward Routes -->
            <path d="M 480,620 L 480,720 L 420,780 L 420,950" stroke="url(#circuitGrad)" stroke-width="2.5" filter="url(#softGlow)"/>
            <path d="M 520,620 L 520,750 L 580,810 L 580,920" stroke="url(#circuitGrad)" stroke-width="2.5" filter="url(#softGlow)"/>
            <path d="M 500,640 L 500,850" stroke="url(#circuitGradPurple)" stroke-width="3"/>
        </g>

        <!-- Route Nodes (Dots on the circuits) -->
        <g fill="#00f2fe" filter="url(#softGlow)">
            <circle cx="300" cy="650" r="5"/>
            <circle cx="200" cy="650" r="4"/>
            <circle cx="120" cy="730" r="6"/>
            <circle cx="330" cy="670" r="3"/>
            <circle cx="250" cy="670" r="4"/>
            <circle cx="340" cy="720" r="5" fill="#9d4edd"/>
            <circle cx="300" cy="700" r="3"/>
            
            <circle cx="700" cy="650" r="5"/>
            <circle cx="800" cy="650" r="4"/>
            <circle cx="880" cy="730" r="6"/>
            <circle cx="670" cy="670" r="3"/>
            <circle cx="750" cy="670" r="4"/>
            <circle cx="660" cy="720" r="5" fill="#9d4edd"/>
            <circle cx="700" cy="700" r="3"/>

            <circle cx="480" cy="720" r="4"/>
            <circle cx="520" cy="750" r="4"/>
        </g>

        <!-- WRAITH BODY (Spectral Layers) -->
        
        <!-- Back Spectral Flow -->
        <path d="M 500,100 C 350,100 250,250 280,450 C 300,580 380,680 500,750 C 620,680 700,580 720,450 C 750,250 650,100 500,100 Z" fill="url(#cloakOuter)"/>
        
        <!-- Mid Spectral Layer (Asymmetrical overlapping drapes) -->
        <path d="M 500,130 C 380,130 300,260 320,440 C 330,530 380,620 480,680 C 490,650 490,550 470,480 C 450,410 470,300 500,280 C 530,300 550,410 530,480 C 510,550 510,650 520,680 C 620,620 670,530 680,440 C 700,260 620,130 500,130 Z" fill="url(#cloakOuter)" opacity="0.8"/>
        
        <!-- Inner Glowing Torso / Robe -->
        <path d="M 500,160 C 400,160 340,280 360,430 C 370,500 410,580 500,640 C 590,580 630,500 640,430 C 660,280 600,160 500,160 Z" fill="url(#cloakInner)"/>

        <!-- Cowl / Hood Folds -->
        <path d="M 500,140 C 410,140 330,220 340,360 C 345,410 380,460 420,490 C 440,460 470,420 500,420 C 530,420 560,460 580,490 C 620,460 655,410 660,360 C 670,220 590,140 500,140 Z" fill="url(#cloakInner)" opacity="0.6"/>

        <!-- The Dark Void inside the Hood (The Face Area) -->
        <path d="M 500,220 C 440,220 400,280 410,380 C 415,420 450,450 500,460 C 550,450 585,420 590,380 C 600,280 560,220 500,220 Z" fill="url(#visorDark)"/>
        
        <!-- Subtle Grid/Tech pattern on the dark visor -->
        <g stroke="#00f2fe" stroke-opacity="0.1" stroke-width="1">
            <line x1="430" y1="300" x2="570" y2="300"/>
            <line x1="420" y1="340" x2="580" y2="340"/>
            <line x1="415" y1="380" x2="585" y2="380"/>
            <line x1="420" y1="420" x2="580" y2="420"/>
            
            <line x1="460" y1="240" x2="460" y2="440"/>
            <line x1="500" y1="220" x2="500" y2="460"/>
            <line x1="540" y1="240" x2="540" y2="440"/>
        </g>

        <!-- WRAITH FACE (The friendly, glowing, approachable eyes) -->
        <!-- Upward curving arches create a warm, gentle "smiling" expression inside the mysterious void -->
        <g filter="url(#neonGlow)">
            <!-- Left Eye -->
            <path d="M 445,340 Q 460,320 475,340" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
            <path d="M 445,340 Q 460,320 475,340" fill="none" stroke="#00f2fe" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
            
            <!-- Right Eye -->
            <path d="M 525,340 Q 540,320 555,340" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
            <path d="M 525,340 Q 540,320 555,340" fill="none" stroke="#00f2fe" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
            
            <!-- Friendly Cheeks (Tiny data dots below the eyes) -->
            <circle cx="435" cy="355" r="4" fill="#00f2fe" opacity="0.8"/>
            <circle cx="565" cy="355" r="4" fill="#00f2fe" opacity="0.8"/>
        </g>

        <!-- THE HEART / ROUTING CORE -->
        <!-- Positioned at the chest area, symbolizing its power to manage pathways -->
        <g transform="translate(500, 500)">
            <!-- Outer Gyro Rings -->
            <ellipse cx="0" cy="0" rx="60" ry="15" fill="none" stroke="#00f2fe" stroke-width="2" transform="rotate(30)" filter="url(#softGlow)" opacity="0.7"/>
            <ellipse cx="0" cy="0" rx="60" ry="15" fill="none" stroke="#9d4edd" stroke-width="2" transform="rotate(-30)" filter="url(#softGlow)" opacity="0.7"/>
            <ellipse cx="0" cy="0" rx="60" ry="15" fill="none" stroke="#4facfe" stroke-width="1" transform="rotate(90)" opacity="0.5"/>
            
            <!-- Floating orbit nodes around the core -->
            <circle cx="52" cy="30" r="3" fill="#ffffff" filter="url(#neonGlow)"/>
            <circle cx="-52" cy="-30" r="3" fill="#ffffff" filter="url(#neonGlow)"/>
            
            <!-- Geometric Core Structure (Diamond/Hexagon) -->
            <polygon points="0,-35 25,-10 25,20 0,45 -25,20 -25,-10" fill="#050714" stroke="#00f2fe" stroke-width="2" filter="url(#neonGlow)"/>
            <polygon points="0,-25 15,-5 15,10 0,30 -15,10 -15,-5" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.8"/>
            
            <!-- Inner Glowing Node -->
            <circle cx="0" cy="2" r="8" fill="#ffffff" filter="url(#neonGlow)"/>
            <circle cx="0" cy="2" r="3" fill="#e0ffff"/>
        </g>

        <!-- Interception Shields / Defensive Network Walls -->
        <!-- Gentle curving lines framing the character, acting as data-firewalls -->
        <g fill="none" stroke-linecap="round" filter="url(#softGlow)" opacity="0.7">
            <!-- Left Shield -->
            <path d="M 220,300 Q 150,450 220,600" stroke="#00f2fe" stroke-width="4"/>
            <path d="M 200,320 Q 120,450 200,580" stroke="#7b2cbf" stroke-width="2" stroke-dasharray="10 10"/>
            
            <!-- Right Shield -->
            <path d="M 780,300 Q 850,450 780,600" stroke="#00f2fe" stroke-width="4"/>
            <path d="M 800,320 Q 880,450 800,580" stroke="#7b2cbf" stroke-width="2" stroke-dasharray="10 10"/>
        </g>
        
        <!-- Floating Packets / Data Shards orbiting the wraith -->
        <g fill="#00f2fe" filter="url(#neonGlow)" opacity="0.8">
            <polygon points="250,250 260,265 250,280 240,265" fill="#4facfe"/>
            <polygon points="750,280 765,290 750,300 735,290"/>
            <polygon points="280,550 290,560 280,570 270,560" fill="#9d4edd"/>
            <polygon points="720,530 730,545 720,560 710,545" fill="#4facfe"/>
            <polygon points="400,180 410,190 400,200 390,190"/>
            <polygon points="600,160 605,168 600,176 595,168" fill="#9d4edd"/>
        </g>

        <!-- Foreground Network Flares -->
        <g opacity="0.4" filter="url(#neonGlow)">
            <circle cx="500" cy="500" r="150" fill="none" stroke="#00f2fe" stroke-width="0.5"/>
            <circle cx="500" cy="500" r="250" fill="none" stroke="#4facfe" stroke-width="0.2"/>
        </g>

    </svg>