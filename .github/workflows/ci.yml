name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changesets:
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: node scripts/check-changeset.mjs --since=origin/${{ github.base_ref }}
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Upload extension artifact
        uses: actions/upload-artifact@v6
        with:
          name: wraithwalker-extension-${{ github.sha }}
          path: packages/extension/dist
          if-no-files-found: error
          retention-days: 14
